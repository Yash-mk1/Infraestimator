{% extends 'scanner/base.html' %}
{% block title %}Log in — InfraMonitor.io{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-box">

    <div class="auth-header">
      <p class="section-eyebrow">// Account</p>
      <h1 class="auth-title">Log in</h1>
      <p class="auth-sub">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>

    <form method="POST" class="auth-form">
      {% csrf_token %}
      {% if next %}<input type="hidden" name="next" value="{{ next }}" />{% endif %}

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="your username" autocomplete="username" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn-primary auth-submit">
        Log in <span class="btn-arrow">→</span>
      </button>
    </form>

  </div>
</div>
{% endblock %}
