{% extends 'scanner/base.html' %}
{% block title %}Sign up — InfraMonitor.io{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-box">

    <div class="auth-header">
      <p class="section-eyebrow">// Account</p>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
    </div>

    <form method="POST" class="auth-form">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="choose a username" autocomplete="username" required />
      </div>

      <div class="form-group">
        <label for="email">Email <span class="form-optional">(optional)</span></label>
        <input type="email" id="email" name="email"
               placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password1">Password</label>
        <input type="password" id="password1" name="password1"
               placeholder="at least 6 characters" autocomplete="new-password" required />
      </div>

      <div class="form-group">
        <label for="password2">Confirm password</label>
        <input type="password" id="password2" name="password2"
               placeholder="repeat password" autocomplete="new-password" required />
      </div>

      <button type="submit" class="btn-primary auth-submit">
        Create account <span class="btn-arrow">→</span>
      </button>
    </form>

  </div>
</div>
{% endblock %}
